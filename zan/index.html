<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Zan Johan | Digital Systems Architect</title>

    <meta
      name="description"
      content="Digital name card for Zan Johan, Digital Systems Architect at The Digital Systems Architect."
    />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#050914" />

    <link rel="canonical" href="https://digi-architect.studio/zan/" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- WhatsApp / Facebook / LinkedIn preview -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="The Digital Systems Architect" />
    <meta property="og:title" content="Zan Johan | Digital Systems Architect" />
    <meta
      property="og:description"
      content="Digital name card for Zan Johan, Digital Systems Architect at The Digital Systems Architect."
    />
    <meta property="og:url" content="https://digi-architect.studio/zan/" />
    <meta
      property="og:image"
      content="https://digi-architect.studio/zan/assets/og-zan-card-v3.png"
    />
    <meta
      property="og:image:secure_url"
      content="https://digi-architect.studio/zan/assets/og-zan-card-v3.png"
    />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Zan Johan digital name card preview"
    />

    <!-- Twitter / X preview -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Zan Johan | Digital Systems Architect" />
    <meta
      name="twitter:description"
      content="Digital name card for Zan Johan, Digital Systems Architect at The Digital Systems Architect."
    />
    <meta
      name="twitter:image"
      content="https://digi-architect.studio/zan/assets/og-zan-card-v3.png"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />
    <script src="zan-card.js" defer></script>
  </head>

  <body>
    <svg class="icon-defs" aria-hidden="true" focusable="false">
      <symbol id="icon-download" viewBox="0 0 24 24">
        <path d="M12 3v10" />
        <path d="m8 9 4 4 4-4" />
        <path d="M5 14v3.5A2.5 2.5 0 0 0 7.5 20h9a2.5 2.5 0 0 0 2.5-2.5V14" />
      </symbol>

      <symbol id="icon-copy" viewBox="0 0 24 24">
        <path d="M9 9h10v10H9z" />
        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
      </symbol>

      <symbol id="icon-whatsapp" viewBox="0 0 24 24">
        <path d="M4.9 19.1 6 15.4a7.5 7.5 0 1 1 2.8 2.7z" />
        <path d="M9.1 8.5c.2-.4.4-.4.6-.4h.5c.2 0 .4.1.5.4l.7 1.6c.1.2.1.4-.1.6l-.4.5c.6 1 1.5 1.8 2.6 2.3l.5-.6c.2-.2.4-.3.7-.2l1.5.7c.3.1.4.3.4.6v.5c0 .3-.2.6-.5.8-.4.2-.9.4-1.4.4-2.8-.1-6.4-3-6.8-5.9-.1-.5 0-.9.2-1.3z" />
      </symbol>

      <symbol id="icon-email" viewBox="0 0 24 24">
        <path d="M4 6h16v12H4z" />
        <path d="m4 7 8 6 8-6" />
      </symbol>

      <symbol id="icon-linkedin" viewBox="0 0 24 24">
        <path d="M6.5 10V18" />
        <path d="M6.5 6.7v.1" />
        <path d="M10.5 18v-8" />
        <path d="M10.5 13.2c0-1.9 1.1-3.2 2.9-3.2 1.7 0 2.8 1.2 2.8 3.4V18" />
        <path d="M4.8 3h14.4A1.8 1.8 0 0 1 21 4.8v14.4a1.8 1.8 0 0 1-1.8 1.8H4.8A1.8 1.8 0 0 1 3 19.2V4.8A1.8 1.8 0 0 1 4.8 3z" />
      </symbol>

      <symbol id="icon-instagram" viewBox="0 0 24 24">
        <rect x="4" y="4" width="16" height="16" rx="5" />
        <circle cx="12" cy="12" r="3.5" />
        <path d="M17.4 6.7v.1" />
      </symbol>

      <symbol id="icon-facebook" viewBox="0 0 24 24">
        <path d="M14 8h2V4h-2.4C10.8 4 9 5.8 9 8.5V11H7v4h2v5h4v-5h2.6l.4-4h-3V8.7c0-.5.4-.7 1-.7z" />
      </symbol>

      <symbol id="icon-close" viewBox="0 0 24 24">
        <path d="m6 6 12 12" />
        <path d="M18 6 6 18" />
      </symbol>
    </svg>

    <main class="card-page" aria-labelledby="card-title">
      <article class="identity-card" aria-label="Digital name card for Zan Johan">
        <header class="card-top">
          <a
            class="brand-logo"
            href="https://digi-architect.studio"
            target="_blank"
            rel="noopener"
            aria-label="Visit The Digital Systems Architect website"
            data-website-link
          >
            <img
              src="assets/company-logo.png"
              alt="The Digital Systems Architect"
            />
          </a>

          <div class="utility-actions" aria-label="Card actions">
            <button
              class="icon-button"
              type="button"
              data-save-contact
              aria-label="Save Zan Johan contact"
            >
              <svg class="icon" aria-hidden="true">
                <use href="#icon-download"></use>
              </svg>
            </button>

            <button
              class="icon-button"
              type="button"
              data-copy-link
              aria-label="Copy digital card link"
            >
              <svg class="icon" aria-hidden="true">
                <use href="#icon-copy"></use>
              </svg>
            </button>
          </div>
        </header>

        <section class="person">
          <img
            class="profile-photo"
            src="assets/zan-profile.jpg"
            alt="Zan Johan"
          />

          <h1 id="card-title">Zan Johan</h1>
          <p class="role">Digital Systems Architect</p>
          <p class="tagline">
            Designing structured digital systems for modern businesses.
          </p>
        </section>

        <section class="qr-section" aria-label="Digital card QR code">
          <button
            class="qr-button"
            type="button"
            data-open-qr
            aria-label="Open enlarged QR code"
          >
            <img
              class="qr-image"
              src="assets/card-qr.png"
              alt="QR code for Zan Johan digital card"
            />
          </button>

          <a
            class="card-url"
            href="https://digi-architect.studio/zan/"
            data-card-url
          >
            digi-architect.studio/zan
          </a>
        </section>

        <nav class="contact-row" aria-label="Contact links">
          <a
            class="social-button"
            href="https://wa.me/6589878714"
            target="_blank"
            rel="noopener"
            aria-label="Open WhatsApp"
            data-whatsapp-link
          >
            <svg class="social-icon" aria-hidden="true">
              <use href="#icon-whatsapp"></use>
            </svg>
          </a>

          <a
            class="social-button"
            href="mailto:zanj@digi-architect.studio"
            aria-label="Email Zan Johan"
            data-email-link
          >
            <svg class="social-icon" aria-hidden="true">
              <use href="#icon-email"></use>
            </svg>
          </a>

          <a
            class="social-button"
            href="https://www.linkedin.com/company/the-digital-systems-architect"
            target="_blank"
            rel="noopener"
            aria-label="Open company LinkedIn page"
            data-linkedin-link
          >
            <svg class="social-icon" aria-hidden="true">
              <use href="#icon-linkedin"></use>
            </svg>
          </a>

          <div class="social-item">
            <a
              class="social-button"
              href="https://www.linkedin.com/in/zanjohan"
              target="_blank"
              rel="noopener"
              aria-label="Open Zan Johan personal LinkedIn profile"
              data-personal-linkedin-link
            >
              <svg class="social-icon" aria-hidden="true">
                <use href="#icon-linkedin"></use>
              </svg>
            </a>

            <span class="social-caption">zan j</span>
          </div>

          <button
            class="social-button"
            type="button"
            data-open-instagram
            aria-label="Open Instagram QR code"
          >
            <svg class="social-icon" aria-hidden="true">
              <use href="#icon-instagram"></use>
            </svg>
          </button>

          <a
            class="social-button"
            href="https://www.facebook.com/share/17tceLy88Z/?mibextid=wwXIfr"
            target="_blank"
            rel="noopener"
            aria-label="Open Facebook"
            data-facebook-link
          >
            <svg class="social-icon" aria-hidden="true">
              <use href="#icon-facebook"></use>
            </svg>
          </a>
        </nav>

        <a
          class="site-link"
          href="https://digi-architect.studio"
          target="_blank"
          rel="noopener"
          data-website-link
        >
          digi-architect.studio
        </a>
      </article>
    </main>

    <dialog class="modal" data-qr-modal aria-labelledby="qr-modal-title">
      <div class="modal-card">
        <header class="modal-top">
          <h2 id="qr-modal-title">Digital card</h2>

          <button
            class="modal-close"
            type="button"
            data-close-qr
            aria-label="Close QR code"
          >
            <svg class="icon" aria-hidden="true">
              <use href="#icon-close"></use>
            </svg>
          </button>
        </header>

        <div class="modal-qr">
          <img
            class="modal-qr-image"
            src="assets/card-qr.png"
            alt="Large QR code for Zan Johan digital card"
          />
        </div>

        <a
          class="modal-url"
          href="https://digi-architect.studio/zan/"
          data-modal-card-url
        >
          digi-architect.studio/zan
        </a>

        <button class="modal-copy" type="button" data-modal-copy-link>
          Copy link
        </button>
      </div>
    </dialog>

    <dialog
      class="modal"
      data-instagram-modal
      aria-labelledby="instagram-modal-title"
    >
      <div class="modal-card">
        <header class="modal-top">
          <h2 id="instagram-modal-title">Instagram</h2>

          <button
            class="modal-close"
            type="button"
            data-close-instagram
            aria-label="Close Instagram QR code"
          >
            <svg class="icon" aria-hidden="true">
              <use href="#icon-close"></use>
            </svg>
          </button>
        </header>

        <img
          class="instagram-qr"
          src="assets/instagram-qr.png"
          alt="Instagram QR code for The Digital Systems Architect"
        />

        <a
          class="modal-url"
          href="https://www.instagram.com/digital.systems.architect"
          target="_blank"
          rel="noopener"
          data-instagram-link
        >
          instagram.com/digital.systems.architect
        </a>

        <button class="modal-copy" type="button" data-copy-instagram>
          Copy Instagram link
        </button>
      </div>
    </dialog>

    <p class="toast" role="status" aria-live="polite" data-toast hidden></p>
  </body>
</html>
