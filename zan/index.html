<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Zan Johan | Digital Systems Architect</title>

    <meta
      name="description"
      content="Digital name card for Zan Johan, Digital Systems Architect at The Digital Systems Architect."
    />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#050914" />

    <link rel="canonical" href="https://digi-architect.studio/zan/" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- WhatsApp / Facebook / LinkedIn preview -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="The Digital Systems Architect" />
    <meta property="og:title" content="Zan Johan | Digital Systems Architect" />
    <meta
      property="og:description"
      content="Digital name card for Zan Johan, Digital Systems Architect at The Digital Systems Architect."
    />
    <meta property="og:url" content="https://digi-architect.studio/zan/" />
    <meta
      property="og:image"
      content="https://digi-architect.studio/zan/assets/og-zan-card-v3.png"
    />
    <meta
      property="og:image:secure_url"
      content="https://digi-architect.studio/zan/assets/og-zan-card-v3.png"
    />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Zan Johan digital name card preview"
    />

    <!-- Twitter / X preview -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Zan Johan | Digital Systems Architect" />
    <meta
      name="twitter:description"
      content="Digital name card for Zan Johan, Digital Systems Architect at The Digital Systems Architect."
    />
    <meta
      name="twitter:image"
      content="https://digi-architect.studio/zan/assets/og-zan-card-v3.png"
    />

    <!-- Fonts and icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="styles.css" />
    <script src="zan-card.js" defer></script>
  </head>

  <body>
    <main class="card-page" aria-labelledby="card-title">
      <article class="identity-card" aria-label="Digital name card for Zan Johan">
        <header class="card-top">
          <a
            class="brand-logo"
            href="https://digi-architect.studio"
            target="_blank"
            rel="noopener"
            aria-label="Visit The Digital Systems Architect website"
            data-website-link
          >
            <img
              src="assets/company-logo.png"
              alt="The Digital Systems Architect"
            />
          </a>

          <div class="utility-actions" aria-label="Card actions">
            <button
              class="top-icon-button"
              type="button"
              data-save-contact
              aria-label="Save Zan Johan contact"
            >
              <i class="bi bi-download" aria-hidden="true"></i>
            </button>

            <button
              class="top-icon-button"
              type="button"
              data-copy-link
              aria-label="Copy digital card link"
            >
              <i class="bi bi-copy" aria-hidden="true"></i>
            </button>
          </div>
        </header>

        <section class="profile-block">
          <img
            class="profile-photo"
            src="assets/zan-profile.jpg"
            alt="Zan Johan"
          />

          <h1 id="card-title">Zan Johan</h1>
          <p class="role">Digital Systems Architect</p>
          <p class="tagline">
            Designing structured digital systems for modern businesses.
          </p>
        </section>

        <!-- Main QR code -->
        <section class="qr-section" aria-label="Digital card QR code">
          <button
            class="qr-button"
            type="button"
            data-open-qr
            aria-label="Open enlarged QR code"
          >
            <img
              class="qr-image"
              src="assets/card-qr.png"
              alt="QR code for Zan Johan digital card"
            />
          </button>

          <a
            class="card-url"
            href="https://digi-architect.studio/zan/"
            data-card-url
          >
            digi-architect.studio/zan
          </a>
        </section>

        <nav class="contact-row" aria-label="Contact links">
          <a
            class="social-button"
            href="https://wa.me/6589878714"
            target="_blank"
            rel="noopener"
            aria-label="Open WhatsApp"
            data-whatsapp-link
          >
            <i class="bi bi-whatsapp" aria-hidden="true"></i>
          </a>

          <a
            class="social-button"
            href="mailto:zanj@digi-architect.studio"
            aria-label="Email Zan Johan"
            data-email-link
          >
            <i class="bi bi-envelope" aria-hidden="true"></i>
          </a>

          <a
            class="social-button"
            href="https://www.linkedin.com/company/the-digital-systems-architect"
            target="_blank"
            rel="noopener"
            aria-label="Open company LinkedIn page"
            data-linkedin-link
          >
            <i class="bi bi-linkedin" aria-hidden="true"></i>
          </a>

          <div class="social-item">
            <a
              class="social-button"
              href="https://www.linkedin.com/in/zanjohan"
              target="_blank"
              rel="noopener"
              aria-label="Open Zan Johan personal LinkedIn profile"
              data-personal-linkedin-link
            >
              <i class="bi bi-linkedin" aria-hidden="true"></i>
            </a>
            <span class="social-caption">zan j</span>
          </div>

          <button
            class="social-button"
            type="button"
            data-open-instagram
            aria-label="Open Instagram QR code"
          >
            <i class="bi bi-instagram" aria-hidden="true"></i>
          </button>

          <a
            class="social-button"
            href="https://www.facebook.com/share/17tceLy88Z/?mibextid=wwXIfr"
            target="_blank"
            rel="noopener"
            aria-label="Open Facebook"
            data-facebook-link
          >
            <i class="bi bi-facebook" aria-hidden="true"></i>
          </a>
        </nav>

        <a
          class="site-link"
          href="https://digi-architect.studio"
          target="_blank"
          rel="noopener"
          data-website-link
        >
          digi-architect.studio
        </a>
      </article>
    </main>

    <!-- Enlarged QR modal -->
    <dialog class="modal" data-qr-modal aria-labelledby="qr-modal-title">
      <div class="modal-card">
        <header class="modal-top">
          <h2 id="qr-modal-title">Digital card</h2>

          <button
            class="modal-close"
            type="button"
            data-close-qr
            aria-label="Close QR code"
          >
            <i class="bi bi-x-lg" aria-hidden="true"></i>
          </button>
        </header>

        <div class="modal-qr">
          <img
            class="modal-qr-image"
            src="assets/card-qr.png"
            alt="Large QR code for Zan Johan digital card"
          />
        </div>

        <a
          class="modal-url"
          href="https://digi-architect.studio/zan/"
          data-modal-card-url
        >
          digi-architect.studio/zan
        </a>

        <button class="modal-copy" type="button" data-modal-copy-link>
          Copy link
        </button>
      </div>
    </dialog>

    <!-- Instagram QR modal -->
    <dialog
      class="modal"
      data-instagram-modal
      aria-labelledby="instagram-modal-title"
    >
      <div class="modal-card">
        <header class="modal-top">
          <h2 id="instagram-modal-title">Instagram</h2>

          <button
            class="modal-close"
            type="button"
            data-close-instagram
            aria-label="Close Instagram QR code"
          >
            <i class="bi bi-x-lg" aria-hidden="true"></i>
          </button>
        </header>

        <img
          class="instagram-qr"
          src="assets/instagram-qr.png"
          alt="Instagram QR code for The Digital Systems Architect"
        />

        <a
          class="modal-url"
          href="https://www.instagram.com/digital.systems.architect"
          target="_blank"
          rel="noopener"
          data-instagram-link
        >
          instagram.com/digital.systems.architect
        </a>

        <button class="modal-copy" type="button" data-copy-instagram>
          Copy Instagram link
        </button>
      </div>
    </dialog>

    <p class="toast" role="status" aria-live="polite" data-toast hidden></p>
  </body>
</html>
